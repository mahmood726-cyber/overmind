name: tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  unit-and-integration:
    # Unit tests always run. Integration tests under tests/integration/
    # are portable (tmp_path only, no portfolio-local paths) so they
    # run on every runner too. The e2e suite (tests/e2e_full_test.py)
    # still depends on a full Claude Code / shell environment and
    # stays local-only.
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Overmind is a Windows-portfolio verifier by design — many tests
        # hardcode Windows path separators, PowerShell command validation,
        # and Windows absolute-path regexes. Matrix narrowed to Windows to
        # match the real deployment target. A cross-platform CI would need
        # per-test skipif markers on ~a dozen tests and would still leave
        # Overmind's actual runtime unverified on Linux (where it isn't
        # used). Sentinel's CI stays on ubuntu+windows because Sentinel
        # is genuinely cross-platform.
        os: [windows-latest]
        # Overmind code uses Path.is_file(follow_symlinks=...) which is
        # 3.12+ (raises TypeError on 3.11). pyproject.toml now declares
        # requires-python = ">=3.12" to match.
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Configure git (tests create local repos)
        run: |
          git config --global user.email "ci@overmind.test"
          git config --global user.name "Overmind CI"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: CLI smoke test
        run: overmind --help

      - name: Run unit tests
        run: python -m pytest tests/unit --tb=short --timeout=60 -q

      - name: Run integration tests
        run: python -m pytest tests/integration --tb=short --timeout=120 -q
